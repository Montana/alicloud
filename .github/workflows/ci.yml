name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.10", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install oss2 alibabacloud_ecs20140526 alibabacloud_alidns20150109
          pip install ruff

      - name: Lint with ruff
        run: ruff check alix.py

      - name: Check syntax
        run: python -m py_compile alix.py

      - name: Verify CLI help output
        run: |
          python alix.py -h
          python alix.py ecs -h
          python alix.py oss -h
          python alix.py dns -h

      - name: Verify credential error handling
        run: |
          # Without credentials, commands should exit non-zero with a clear message
          if python alix.py ecs list; then
            echo "Expected failure without credentials" && exit 1
          fi
